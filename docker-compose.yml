name: i-amu-v2-6

services:
  # ─── Application PHP + Apache ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: iamu-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: iamu
      DB_USER: iamu_user
      DB_PASS: iamu_password
      # Pointe vers l'Ollama natif tournant sur la machine hôte
      OLLAMA_HOST: http://host.docker.internal:11434
      # SMTP de développement (maildev) — aucun mail réel n'est envoyé.
      MAIL_HOST: maildev
      MAIL_PORT: 1025
      MAIL_FROM: noreply@iamu.local
      MAIL_FROM_NAME: I-AMU
    extra_hosts:
      # Nécessaire sur Linux ; sans effet (mais inoffensif) sur macOS/Windows
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      maildev:
        condition: service_started
    networks:
      - iamu-net

  # ─── Base de données PostgreSQL ────────────────────────────
  db:
    image: postgres:14-alpine
    container_name: iamu-db
    restart: unless-stopped
    ports:
      # 5433 côté hôte pour ne pas entrer en conflit avec un PostgreSQL local
      - "5433:5432"
    environment:
      POSTGRES_DB: iamu
      POSTGRES_USER: iamu_user
      POSTGRES_PASSWORD: iamu_password
    volumes:
      - db-data:/var/lib/postgresql/data
      # Auto-chargement du schéma et seed au premier démarrage
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iamu_user -d iamu"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - iamu-net

  # ─── Adminer (interface web légère pour PostgreSQL) ────────
  adminer:
    image: adminer:latest
    container_name: iamu-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      # Pré-sélectionne le serveur `db` à l'ouverture
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iamu-net

  # ─── Maildev (capture SMTP + interface web) ────────────────
  maildev:
    image: maildev/maildev:latest
    container_name: iamu-maildev
    restart: unless-stopped
    ports:
      # UI web pour lire les mails captés
      - "8025:1080"
      # Port SMTP exposé aussi côté hôte si on veut tester depuis l'hôte
      - "1025:1025"
    environment:
      MAILDEV_SMTP_PORT: 1025
      MAILDEV_WEB_PORT: 1080
    networks:
      - iamu-net

volumes:
  db-data:
    driver: local

networks:
  iamu-net:
    driver: bridge
